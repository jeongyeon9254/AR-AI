appId: com.ar-ai.app
productName: AR-AI
copyright: Copyright 2026

directories:
  output: dist
  buildResources: build

files:
  - out/**/*
  - src/main/skills/*.md
  - "!**/*.map"

extraMetadata:
  main: out/main/index.js

asarUnpack:
  - "**/node_modules/better-sqlite3/**"
  - "**/node_modules/@anthropic-ai/claude-agent-sdk/**"

npmRebuild: true

# macOS
mac:
  category: public.app-category.developer-tools
  artifactName: "${productName}-${version}-mac-${arch}.${ext}"
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]

dmg:
  title: "${productName} ${version}"
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# Windows
win:
  artifactName: "${productName}-${version}-win-${arch}.${ext}"
  target:
    - target: nsis
      arch: [x64]
    - target: zip
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: AR-AI

# Linux
linux:
  artifactName: "${productName}-${version}-linux-${arch}.${ext}"
  target:
    - AppImage
    - deb
  category: Development

# 자동 업데이트 (GitHub Releases 사용 시)
publish:
  provider: github
  owner: jeongyeon9254
  repo: AR-AI
  releaseType: release
